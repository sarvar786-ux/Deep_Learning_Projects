<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify Authenticity | Zero-Watermarking</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Roboto, Arial, sans-serif;
    background:#f5f7fb;
    color:#1f2937;
}

/* NAVBAR */
nav{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 60px;
}

.logo{
    font-size:22px;
    font-weight:600;
}

nav a{
    color:#e5e7eb;
    text-decoration:none;
    margin-left:28px;
    font-size:15px;
}

nav a:hover{
    color:#ffffff;
}

/* PAGE TITLE */
.page-title{
    text-align:center;
    margin:45px 0 25px;
}

.page-title h1{
    margin:0;
    font-size:26px;
    color:#0f172a;
}

.page-title p{
    color:#6b7280;
    margin-top:8px;
}

/* FORM CARD */
.card{
    background:white;
    max-width:420px;
    margin:0 auto 60px;
    padding:35px;
    border-radius:10px;
    box-shadow:0 8px 22px rgba(0,0,0,0.08);
}

label{
    display:block;
    text-align:left;
    font-size:14px;
    color:#374151;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #d1d5db;
    border-radius:6px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#0f172a;
}

button{
    width:100%;
    padding:12px;
    background:#0f172a;
    border:none;
    color:white;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#020617;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Zero-Watermarking System</div>
    <div>
        <a href="/">Home</a>
        <a href="/index">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<!-- TITLE -->
<div class="page-title">
    <h1>Verify Image Authenticity</h1>
    <p>Upload test image and zero-watermark to validate originality</p>
</div>

<!-- FORM -->
<div class="card">
    <form action="/verify" method="POST" enctype="multipart/form-data">

        <label>Test Image</label>
        <input type="file" name="test_file" required>

        <label>Zero-Watermark</label>
        <input type="file" name="wm_file" required>

        <button type="submit">Verify Authenticity</button>
    </form>
</div>

</body>
</html>
