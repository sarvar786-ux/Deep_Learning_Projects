<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Zero-Watermarking</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Roboto, Arial, sans-serif;
    background:#f5f7fb;
    color:#2b2b2b;
}

/* NAVBAR */
nav{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 60px;
}

.logo{
    font-size:22px;
    font-weight:600;
    letter-spacing:0.4px;
}

nav a{
    color:#e5e7eb;
    text-decoration:none;
    margin-left:30px;
    font-size:15px;
}

nav a:hover{
    color:#ffffff;
}

/* LOGIN BOX */
.box{
    max-width:420px;
    margin:90px auto;
    background:white;
    padding:40px;
    border-radius:8px;
    box-shadow:0 6px 22px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:28px;
    color:#0f172a;
    font-size:24px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #d1d5db;
    border-radius:6px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#0f172a;
}

button{
    width:100%;
    padding:12px;
    background:#0f172a;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#020617;
}

.link{
    margin-top:18px;
    text-align:center;
    font-size:14px;
}

.link a{
    color:#0f172a;
    text-decoration:none;
    font-weight:500;
}

.link a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Zero-Watermarking System</div>
    <div>
        <a href="/">Home</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="box">
    <h2>User Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        New user? <a href="/register">Create an account</a>
    </div>
</div>

</body>
</html>
