<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result | Zero-Watermarking</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Roboto, Arial, sans-serif;
    background:#f5f7fb;
    color:#1f2937;
}

/* NAVBAR */
nav{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 60px;
}

.logo{
    font-size:22px;
    font-weight:600;
}

nav a{
    color:#e5e7eb;
    text-decoration:none;
    margin-left:26px;
    font-size:15px;
}

nav a:hover{
    color:#ffffff;
}

/* RESULT CARD */
.card{
    max-width:820px;
    margin:55px auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 26px rgba(0,0,0,0.08);
    text-align:center;
}

h2{
    margin-top:0;
    color:#0f172a;
}

/* STATUS BADGE */
.status{
    display:inline-block;
    padding:8px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
    margin-bottom:25px;
}

.success{
    background:#dcfce7;
    color:#166534;
}

.fail{
    background:#fee2e2;
    color:#991b1b;
}

/* IMAGES */
.images{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    margin-top:25px;
}

.img-box h3{
    margin-bottom:10px;
    color:#374151;
}

img{
    width:260px;
    border-radius:10px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

/* BUTTONS */
.btn{
    display:inline-block;
    margin:18px 10px 0;
    padding:10px 22px;
    background:#0f172a;
    color:white;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
}

.btn:hover{
    background:#020617;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Zero-Watermarking System</div>
    <div>
        <a href="/">Home</a>
        <a href="/index">Dashboard</a>
        <a href="/chart">Chart</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<!-- RESULT -->
<div class="card">

    {% if "Authentic" in message %}
        <div class="status success">Authentic Image</div>
    {% else %}
        <div class="status fail">Tampered Image</div>
    {% endif %}

    <h2>{{ message }}</h2>

    <div class="images">
        {% if image_path %}
        <div class="img-box">
            <h3>Uploaded Image</h3>
            <img src="{{ image_path }}">
        </div>
        {% endif %}

        {% if watermark_path %}
        <div class="img-box">
            <h3>Zero-Watermark</h3>
            <img src="{{ watermark_path }}">
            <br>
            <a class="btn" href="{{ watermark_path }}" download>Download Watermark</a>
        </div>
        {% endif %}
    </div>

    <br>
    <a class="btn" href="/index">Back to Dashboard</a>
</div>

</body>
</html>
