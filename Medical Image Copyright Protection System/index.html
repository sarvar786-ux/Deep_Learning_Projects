<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Zero-Watermarking</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Roboto, Arial, sans-serif;
    background:#f5f7fb;
    color:#1f2937;
}

/* NAVBAR */
nav{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 60px;
}

.logo{
    font-size:22px;
    font-weight:600;
    letter-spacing:0.4px;
}

nav a{
    color:#e5e7eb;
    text-decoration:none;
    margin-left:28px;
    font-size:15px;
}

nav a:hover{
    color:#ffffff;
}

/* PAGE TITLE */
.page-title{
    text-align:center;
    margin:45px 0 25px;
}

.page-title h1{
    margin:0;
    font-size:28px;
    color:#0f172a;
}

.page-title p{
    color:#6b7280;
    margin-top:8px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:0 auto 60px;
    padding:0 30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

/* CARD */
.card{
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 8px 22px rgba(0,0,0,0.08);
}

.card h2{
    margin-top:0;
    color:#0f172a;
    font-size:20px;
    margin-bottom:18px;
}

label{
    font-size:14px;
    color:#374151;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0 20px;
    border:1px solid #d1d5db;
    border-radius:6px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#0f172a;
}

button{
    width:100%;
    padding:12px;
    background:#0f172a;
    border:none;
    color:white;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#020617;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Zero-Watermarking System</div>
    <div>
        <a href="/">Home</a>
        <a href="/index">Dashboard</a>
        <a href="/charts">Charts</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<!-- TITLE -->
<div class="page-title">
    <h1>Zero-Watermarking Dashboard</h1>
    <p>Generate and verify medical image authenticity securely</p>
</div>

<!-- MAIN -->
<div class="container">

    <!-- GENERATE -->
    <div class="card">
        <h2>Generate Zero-Watermark</h2>
        <form action="/generate" method="POST" enctype="multipart/form-data">
            <label>Upload Medical Image</label>
            <input type="file" name="file" required>
            <button type="submit">Generate Watermark</button>
        </form>
    </div>

    <!-- VERIFY -->
    <div class="card">
        <h2>Verify Image Authenticity</h2>
        <form action="/verify" method="POST" enctype="multipart/form-data">
            <label>Upload Test Image</label>
            <input type="file" name="test_file" required>

            <label>Upload Zero-Watermark</label>
            <input type="file" name="wm_file" required>

            <button type="submit">Verify Authenticity</button>
        </form>
    </div>

</div>

</body>
</html>
